version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: repo-assistant-db
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: password
      POSTGRES_DB: repo_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: repo-assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
  redisdata:
